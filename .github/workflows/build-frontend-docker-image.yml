name: build frontend-image

on:
  push:
    branches:
      - 'dev'
      - 'main'
    paths:
      - 'praktikumsplaner-frontend/**'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-docker-push:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: "./praktikumsplaner-frontend/package-lock.json"
      - name: Install dependencies
        run: npm --prefix ./praktikumsplaner-frontend ci
        shell: bash
      - name: Run lint
        run: npm run --prefix  ./praktikumsplaner-frontend lint
        shell: bash
      - name: Run test
        run: npm run  --prefix ./praktikumsplaner-frontend test
        shell: bash
      - name: Run build
        run: npm run  --prefix ./praktikumsplaner-frontend build
        shell: bash

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./praktikumsplaner-frontend
          push: true
          tags: ${{ env.REGISTRY }}/it-at-m/praktikumsplaner/praktikumsplaner-frontend:latest
