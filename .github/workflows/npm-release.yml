name: Release NPM

on:
  workflow_dispatch:
    inputs:
      release-version:
        type: choice
        description: "Select version increment type (follows Semantic Versioning)"
        required: true
        options:
          - patch
          - minor
          - major
      app-path:
        type: choice
        description: "Select the node service to release"
        required: true
        default: praktikumsplaner-frontend
        options:
          - praktikumsplaner-frontend

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance
    outputs:
      ARTIFACT_NAME: ${{ steps.node.outputs.artifact-name }}
      ARTIFACT_VERSION: ${{ steps.npm_release.outputs.ARTIFACT_VERSION }}
    steps:
      - id: npm_release
        uses: it-at-m/lhm_actions/action-templates/actions/action-npm-release@e012d3bda6f9d5511415e2d885f32826049284a4 # v1.0.23
        with:
          app-path: ${{ inputs.app-path }}
          node-version: '24'
          releaseVersion: ${{ inputs.release-version }}
          use-pr: 'true'
      - id: node
        uses: it-at-m/lhm_actions/action-templates/actions/action-npm-build@e012d3bda6f9d5511415e2d885f32826049284a4 # v1.0.23
        with:
          app-path: ${{ inputs.app-path }}
          node-version: '24'

  build-image:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-build-image@e012d3bda6f9d5511415e2d885f32826049284a4 # v1.0.23
        with:
          path: ${{ inputs.app-path }}
          image-name: ${{ inputs.app-path }}
          artifact-name: ${{ needs.release.outputs.ARTIFACT_NAME }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          registry-username: ${{ github.actor }}
          image-tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.ARTIFACT_VERSION }}
            type=raw,value=latest

  create-github-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: it-at-m/lhm_actions/action-templates/actions/action-create-github-release@e012d3bda6f9d5511415e2d885f32826049284a4 # v1.0.23
        with:
          artifact-name: ${{ needs.release.outputs.ARTIFACT_NAME }}
          tag-name: ${{ inputs.app-path }}-${{ needs.release.outputs.ARTIFACT_VERSION }}
