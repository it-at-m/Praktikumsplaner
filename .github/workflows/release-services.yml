name: release services

on:
  workflow_dispatch:
    inputs:
      release-version:
        description: 'Services release version'
        type: string
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  backend-build-and-docker-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      - name: Set up JDK 17
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5
        with:
          cache: "maven"
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots --no-transfer-progress -f praktikumsplaner-backend/pom.xml verify

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: Login to DockerHub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@f6010ea70151369b06f0194be1051fbbdff851b2 # v6.0.2
        with:
          context: ./praktikumsplaner-backend
          push: true
          tags: ${{ env.REGISTRY }}/it-at-m/praktikumsplaner/praktikumsplaner-backend:latest,${{ env.REGISTRY }}/it-at-m/praktikumsplaner/praktikumsplaner-backend:${{ inputs.release-version }}

  frontend-build-and-docker-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22.20.0
          cache: "npm"
          cache-dependency-path: "./praktikumsplaner-frontend/package-lock.json"
      - name: Install dependencies
        run: npm --prefix ./praktikumsplaner-frontend ci
        shell: bash
      - name: Run lint
        run: npm run --prefix  ./praktikumsplaner-frontend lint
        shell: bash
      - name: Run test
        run: npm run  --prefix ./praktikumsplaner-frontend test
        shell: bash
      - name: Run build
        run: npm run  --prefix ./praktikumsplaner-frontend build
        shell: bash

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: Login to DockerHub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@f6010ea70151369b06f0194be1051fbbdff851b2 # v6.0.2
        with:
          context: ./praktikumsplaner-frontend
          push: true
          tags: ${{ env.REGISTRY }}/it-at-m/praktikumsplaner/praktikumsplaner-frontend:latest,${{ env.REGISTRY }}/it-at-m/praktikumsplaner/praktikumsplaner-frontend:${{ inputs.release-version }}