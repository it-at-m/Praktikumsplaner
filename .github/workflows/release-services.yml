name: release services

on:
  workflow_dispatch:
    inputs:
      release-version:
        description: 'Services release version'
        type: string
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  backend-build-and-docker-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Set up JDK 21
        uses: actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e # v5.1.0
        with:
          cache: "maven"
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots --no-transfer-progress -f praktikumsplaner-backend/pom.xml verify

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Login to DockerHub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./praktikumsplaner-backend
          push: true
          tags: ${{ env.REGISTRY }}/it-at-m/praktikumsplaner/praktikumsplaner-backend:latest,${{ env.REGISTRY }}/it-at-m/praktikumsplaner/praktikumsplaner-backend:${{ inputs.release-version }}

  frontend-build-and-docker-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22.22.1
          cache: "npm"
          cache-dependency-path: "./praktikumsplaner-frontend/package-lock.json"
      - name: Install dependencies
        run: npm --prefix ./praktikumsplaner-frontend ci
        shell: bash
      - name: Run lint
        run: npm run --prefix  ./praktikumsplaner-frontend lint
        shell: bash
      - name: Run test
        run: npm run  --prefix ./praktikumsplaner-frontend test
        shell: bash
      - name: Run build
        run: npm run  --prefix ./praktikumsplaner-frontend build
        shell: bash

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Login to DockerHub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./praktikumsplaner-frontend
          push: true
          tags: ${{ env.REGISTRY }}/it-at-m/praktikumsplaner/praktikumsplaner-frontend:latest,${{ env.REGISTRY }}/it-at-m/praktikumsplaner/praktikumsplaner-frontend:${{ inputs.release-version }}