id: add client pp
author: MrSebastian
realm: ${SSO_REALM}
changes:
  - addSimpleClient:
      clientId: ${SSO_CLIENT_ID}
      secret: ${SSO_CLIENT_SECRET}
      publicClient: false
      redirectUris:
        - http://*
        - https://*

  # maps user attribute department to a claim department
  - addClientUserAttributeMapper:
      clientId: ${SSO_CLIENT_ID}
      name: department
      userAttribute: department
      claimName: department
      addToUserInfo: true
      addToAccessToken: true

  # Add roles to user-info
  - deleteClientScopeMapper:
      clientScopeName: roles
      name: client roles
  - addClientScopeMapper:
      clientScopeName: roles
      name: client roles
      protocolMapper: oidc-usermodel-client-role-mapper
      config:
        "multivalued": "true"
        "userinfo.token.claim": "true"
        "id.token.claim": "false"
        "access.token.claim": "true"
        "claim.name": "resource_access.$${client_id}.roles"
        "jsonType.label": "String"
